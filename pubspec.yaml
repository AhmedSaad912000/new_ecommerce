name: ecommerce
description: "A new Flutter project."


publish_to: 'none' 













version: 1.0.0+1

environment:
  sdk: '>=3.2.6 <4.0.0'







dependencies:
  flutter:
    sdk: flutter


  
  
  intl: ^0.20.2
  lottie: ^3.3.1
  shimmer: ^3.0.0
  clipboard: ^0.1.3
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  flutter_dropzone: ^4.2.1
  flutter_typeahead: ^5.2.0
  connectivity_plus: ^6.1.4
  multi_select_flutter: ^4.1.3
  cached_network_image: ^3.4.1
  flutter_native_splash: ^2.4.6
  smooth_page_indicator: ^1.2.1
  http: ^1.4.0
  html: ^0.15.6
  fl_chart: ^1.0.0
  data_table_2: ^2.6.0
  url_strategy: ^0.2.0
  universal_html: ^2.2.4
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  get_storage: ^2.1.1
  logger: ^2.6.1
  carousel_slider: ^5.1.1
  readmore: ^3.0.0
  flutter_rating_bar: ^4.0.1





dev_dependencies:
  flutter_test:
    sdk: flutter

  
  
  
  
  
  flutter_lints: ^2.0.0





flutter:

  
  
  
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/logos/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        -  asset: assets/fonts/Poppins-Regular.ttf
           weight: 400
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-Light.ttf
    - family: Coolvetica
      fonts:
        - asset: assets/fonts/coolvetica rgular.ttf
        - asset: assets/fonts/coolvetica rgular italic.ttf


  
  
  
  

  
  

  
  

  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
